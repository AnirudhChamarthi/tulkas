name: tulkas

services:
  - name: api
    source_dir: backend
    github:
      repo: AnirudhChamarthi/tulkas
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    run_command: node dist/index.js
    environment_slug: node-js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /health
    # Env vars: set all in App Platform UI (Settings → Environment Variables).
    # Required: DATABASE_URL, REDIS_URL, SPACES_*, GRADIENT_*, BRAVE_SEARCH_KEY,
    #           FUNCTION_BRAVE_SEARCH_URL, FUNCTION_ARTICLE_FETCH_URL
